<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Output</title>
    <script>
        function updateContent() {
            var htmlContent = localStorage.getItem('htmlContent');
            if (htmlContent) {
                document.getElementById('output').innerHTML = htmlContent;
                // Extract and set title from HTML content
                var title = getTitleFromHTML(htmlContent);
                document.title = title || "HTML Output"; // Default title if not found
            } else {
                document.getElementById('output').innerHTML = '<p>Error: No content provided. In the black box, type Hi! and see the result!</p>';
                document.getElementById('output').innerHTML = '<p>If the box does not work, try restarting the web browser.</p>';
            }
        }

        function getTitleFromHTML(htmlContent) {
            var doc = new DOMParser().parseFromString(htmlContent, 'text/html');
            var titleTag = doc.querySelector('title');
            return titleTag ? titleTag.textContent : null;
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateContent();
        });
    </script>
</head>
<body>
    <div id="output"></div>
</body>
</html>
