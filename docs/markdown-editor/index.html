<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.62.0/codemirror.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
            height: 100vh; /* Full height for the body */
            display: flex;
            flex-direction: column;
        }

        #mdeditor-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            height: calc(100vh - 80px); /* Adjust height based on viewport */
        }

        #mdeditor, #mdpreview {
            min-height: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            overflow: auto;
        }

        #mdpreview {
            background-color: #f0f0f0;
        }

        #update-btn {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #update-btn:hover {
            background-color: #0056b3;
        }

        .gutter {
            background-color: #ddd;
            cursor: col-resize;
            height: calc(100vh - 80px); /* Same height as editor-container */
        }
    </style>
</head>
<body>
    <h2>Markdown Editor</h2>

    <div id="mdeditor-container">
        <textarea id="mdeditor"></textarea>
        <div id="mdpreview"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.62.0/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.62.0/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/2.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.0/split.min.js"></script>
    <script>
        const editor = CodeMirror.fromTextArea(document.getElementById('mdeditor'), {
            mode: 'markdown',
            lineNumbers: true,
            autofocus: true,
            extraKeys: { 'Ctrl-Space': 'autocomplete' }
        });

        const preview = document.getElementById('mdpreview');

        function updatePreview() {
            const markdown = editor.getValue();
            const html = marked(markdown);
            preview.innerHTML = html;
        }

        editor.on('change', updatePreview);

        // Initialize preview
        updatePreview();

        // Use Split.js to make the editor and preview resizable
        Split(['#mdeditor', '#mdpreview'], {
            sizes: [50, 50],
            minSize: 200,
            gutterSize: 10,
            cursor: 'col-resize',
            gutter: function(index, direction) {
                var gutter = document.createElement('div');
                gutter.className = `gutter gutter-${direction}`;
                return gutter;
            },
        });
    </script>
</body>
</html>
