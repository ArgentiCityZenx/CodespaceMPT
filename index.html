<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Ninja</title>
  <!-- Include CodeMirror CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/codemirror.min.css">
  <!-- Include CodeMirror JavaScript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/codemirror.min.js"></script>
  <!-- Include appropriate CodeMirror mode (e.g., JavaScript) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/mode/javascript/javascript.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
    }
    #code-editor {
      width: 80%;
      height: 60vh;
      margin: 20px auto;
      border: 1px solid #ccc;
    }
    #discord-button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      background-color: #7289da;
      color: white;
      border: none;
      border-radius: 4px;
    }
    #discord-button:hover {
      background-color: #5f73bc;
    }
    #theme-button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      background-color: #ff9800;
      color: white;
      border: none;
      border-radius: 4px;
    }
    #theme-button:hover {
      background-color: #f57c00;
    }
    .top-right-image {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 9999;
    }
    #terminal-container {
      width: 80%;
      margin: 20px auto;
      border: 1px solid #ccc;
      background-color: #000;
      color: #fff;
    }
    #terminal {
      padding: 10px;
    }
    input[type="text"] {
      width: calc(100% - 20px);
      padding: 5px;
      margin-top: 10px;
      border: none;
      background-color: inherit;
      color: inherit;
      font-family: sans-serif;
      outline: none;
    }
  </style>
</head>
<body>
  <button id="toggleTerminalButton">Toggle Terminal</button>
  <div id="terminal-container">
    <div id="terminal"></div>
    <input type="text" id="commandInput" autofocus>
  </div>
  <button id="discord-button" onclick="window.location.href='https://discord.gg/WbdmAkx8'">Join our Discord Server</button>
  <button id="theme-button" onclick="toggleTheme()">Toggle Theme</button>
  <textarea id="code-editor"></textarea>
  <div class="top-right-image">
    <img src="https://github.com/ninjalandia/gitsite/raw/main/logo.png" alt="Ninjalandia Logo" width="50">
  </div>
  
  <script>
    const terminalContainer = document.getElementById("terminal-container");
    const terminal = document.getElementById("terminal");
    const commandInput = document.getElementById("commandInput");
    const toggleTerminalButton = document.getElementById("toggleTerminalButton");

    function echo(message) {
      terminal.innerHTML += `<div>${message}</div>`;
    }

    function changeTextColor(color) {
      terminal.style.color = color;
    }

    function displayIP() {
      fetch('https://api.ipify.org?format=json')
        .then(response => response.json())
        .then(data => {
          echo(`Your IP address: ${data.ip}`);
        })
        .catch(error => {
          echo('Unable to retrieve IP address.');
          console.error('Error:', error);
        });
    }

    function displayDeviceInfo() {
      const deviceInfo = `Device Type: ${getDeviceType()}, Screen Size: ${getScreenSize()}`;
      echo(deviceInfo);
    }

    function getDeviceType() {
      const userAgent = navigator.userAgent;
      if (/mobile/i.test(userAgent)) {
        return 'Mobile';
      } else if (/tablet/i.test(userAgent)) {
        return 'Tablet';
      } else {
        return 'Desktop';
      }
    }

    function getScreenSize() {
      return `${window.innerWidth} x ${window.innerHeight}`;
    }

    function displayHelp() {
      const helpMessage = `
        Available commands:
        - echo "message": Displays the provided message.
        - color #custom: Changes the text color to the specified custom color.
        - rip: Displays your IP address.
        - device: Displays your device information.
        - help: Displays this help message.`;
      echo(helpMessage);
    }

    function toggleTheme() {
      const body = document.body;
      const currentTheme = body.style.backgroundColor;
      if (currentTheme === "rgb(255, 255, 255)" || currentTheme === "#ffffff") {
        body.style.backgroundColor = "#000000";
        body.style.color = "#ffffff";
      } else {
        body.style.backgroundColor = "#ffffff";
        body.style.color = "#000000";
      }
    }

    toggleTerminalButton.addEventListener("click", function() {
      terminalContainer.style.display = terminalContainer.style.display === 'none' ? 'block' : 'none';
    });

    commandInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        const command = commandInput.value.trim().toLowerCase();
        if (command.startsWith("echo")) {
          const message = command.substring(5).trim();
          echo(message);
        } else if (command.startsWith("color")) {
          const color = command.substring(6).trim();
          changeTextColor(color);
        } else if (command === "rip") {
          displayIP();
        } else if (command === "device") {
          displayDeviceInfo();
        } else if (command === "help") {
          displayHelp();
        } else {
          echo(`Command not recognized: ${command}`);
        }
        commandInput.value = "";
      }
    });

    // Initialize CodeMirror with line numbers
    const codeEditor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
      lineNumbers: true,
      mode: "javascript"
    });
  </script>
</body>
</html>
