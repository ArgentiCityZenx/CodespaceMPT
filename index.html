<!DOCTYPE html>
<head>
  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Ninja</title>
  <!-- Include CodeMirror CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/codemirror.min.css">
  <!-- Include CodeMirror JavaScript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/codemirror.min.js"></script>
  <!-- Include appropriate CodeMirror mode (e.g., JavaScript) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/mode/javascript/javascript.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
    }
    #code-editor {
      width: 80%;
      height: 60vh;
      margin: 20px auto;
      border: 1px solid #ccc;
    }
    #discord-button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      background-color: #7289da;
      color: white;
      border: none;
      border-radius: 4px;
    }
    #discord-button:hover {
      background-color: #5f73bc;
    }
    .top-right-image {
      position: absolute;
      top: 10px; 
      right: 10px; 
      z-index: 9999; 
    }
   #terminal {
      width: 80%;
      margin: 20px auto;
      border: 1px solid #ccc;
      padding: 10px;
      background-color: #000;
      color: #fff;
    }
    input[type="text"] {
      width: calc(100% - 20px);
      padding: 5px;
      margin-top: 10px;
      border: none;
      background-color: #000;
      color: #fff;
      font-family: monospace;
      outline: none;
    }
  </style>
</head>
<body>
  <!-- Code editor container -->
  <textarea id="code-editor">
  </textarea>
  
  <!-- Theme toggle button -->
  <button onclick="toggleTheme()">Change Theme</button>
  
  <!-- Discord button -->
  <button id="discord-button" onclick="goToDiscord()">Join Discord</button>
  
  <script>
    var currentTheme = 0; // 0: White, 1: Dark
    var themes = ['#ffffff', '#000000'];
    
    // Initialize CodeMirror with default theme
    var editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
      mode: "javascript",
      lineNumbers: true,
      theme: "default" // Default theme
    });

    // Function to toggle theme
    function toggleTheme() {
      var body = document.body;
      currentTheme = (currentTheme + 1) % themes.length;
      body.style.backgroundColor = themes[currentTheme];
    }

    // Function to redirect to Discord server
    function goToDiscord() {
      window.location.href = "https://discord.gg/WbdmAkx8";
    }
  </script>
<img src="https://raw.githubusercontent.com/ninjalandia/gitsite/logo.png" class="top-right-image" alt="Image">

  <div id="terminal"></div>
  <input type="text" id="commandInput" autofocus>
  <script>
    const terminal = document.getElementById("terminal");
    const commandInput = document.getElementById("commandInput");
    
    function echo(message) {
      terminal.innerHTML += `<div>${message}</div>`;
    }
    
    function changeTextColor(color) {
      terminal.style.color = color;
    }
    
    function displayIP() {
      fetch('https://api.ipify.org?format=json')
        .then(response => response.json())
        .then(data => {
          echo(`Your IP address: ${data.ip}`);
        })
        .catch(error => {
          echo('Unable to retrieve IP address.');
          console.error('Error:', error);
        });
    }
    
    commandInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        const command = commandInput.value.trim().toLowerCase();
        if (command.startsWith("echo")) {
          const message = command.substring(5).trim();
          echo(message);
        } else if (command.startsWith("color")) {
          const color = command.substring(6).trim();
          changeTextColor(color);
        } else if (command === "rip") {
          displayIP();
        } else {
          echo(`Command not recognized: ${command}`);
        }
        commandInput.value = "";
      }
    });
  </script>
</body>
</html>

</head>
